<svg viewBox="0 0 200 44" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, 'Segoe UI Rounded', 'Arial Rounded MT Bold', sans-serif">

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="44" fill="#0a0e14"/>

  <text x="100" y="27" text-anchor="middle" font-weight="700" font-size="15" fill="#ffb84d" letter-spacing="1" filter="url(#glow)">TECH STACK</text>

</svg>
